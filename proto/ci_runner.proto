syntax = "proto3";

package ci;
option go_package = "./ci";

service CiRunnerService {
  rpc RegisterRunner(RegisterRunnerReq) returns (RegisterRunnerResp);
  
  // ✅ 正确：服务端流 → 服务端主动下发任务给客户端
  rpc DispatchTaskStream(DispatchTaskReq) returns (stream DispatchTaskResp);

  // 双向流：执行日志上报
  rpc ExecuteTaskStream(stream ExecuteTaskReport) returns (stream ExecuteTaskCommand);

  // 心跳
  rpc Heartbeat(HeartbeatReq) returns (HeartbeatResp);
}

// 注册
message RegisterRunnerReq {
  string runner_id = 1;
  string version = 2;
}
message RegisterRunnerResp {
  bool success = 1;
}

// ==========================
// 下发任务（服务端 → 客户端）
// ==========================
message DispatchTaskReq {
  string runner_id = 1;  // 要发给哪个 runner
}
message DispatchTaskResp {
  string task_id = 1;
  string repo_url = 2;
  string branch = 3;
  string script = 4;
}

// ==========================
// 执行：服务端发指令
// ==========================
message ExecuteTaskCommand {
  string task_id = 1;
  enum Command {
    START = 0;
    CANCEL = 1;
  }
  Command cmd = 2;
}

// ==========================
// 执行：客户端上报状态/日志
// ==========================
message ExecuteTaskReport {
  string task_id = 1;
  enum Status {
    RUNNING = 0;
    SUCCESS = 1;
    FAILED = 2;
  }
  Status status = 2;
  string log = 3;
}

// ==========================
// 心跳（带任务列表）
// ==========================
message HeartbeatReq {
  string runner_id = 1;
  uint64 timestamp = 2;
  repeated string running_task_ids = 3;
}
message HeartbeatResp {
  bool success = 1;
}